<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Volunteer Tracking</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

/* Create map */

const map = L.map("map").setView([14.6819,77.6006],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}
).addTo(map);

let volunteerMarker;


/* Listen for volunteer location */

socket.on("updateVolunteerLocation",(data)=>{

const lat = data.lat;
const lng = data.lng;

if(volunteerMarker){

volunteerMarker.setLatLng([lat,lng]);

}else{

volunteerMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("Volunteer is coming")
.openPopup();

}

});

</script>

</body>
</html>
