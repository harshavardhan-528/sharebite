<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nearby Food Requests | ShareBite</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

header{
background:#28a745;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

#map{
height:90vh;
width:100%;
}

</style>

</head>

<body>

<header>
Nearby Food Requests
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map("map").setView([14.6819,77.6006],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19
}
).addTo(map);


/* Detect current location */

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(loadRequests,locationError);

}else{

alert("Geolocation not supported");

}


/* Load nearby requests */

async function loadRequests(position){

const lat = position.coords.latitude;
const lng = position.coords.longitude;

/* Show user location */

L.marker([lat,lng])
.addTo(map)
.bindPopup("You are here")
.openPopup();

map.setView([lat,lng],13);


try{

const response = await fetch(`/api/request/nearby?lat=${lat}&lng=${lng}`);

const data = await response.json();

if(data.requests){

data.requests.forEach(request=>{

L.marker([request.latitude,request.longitude])
.addTo(map)
.bindPopup(
"<b>Food Needed:</b> "+request.foodType+
"<br><b>Quantity:</b> "+request.quantity+
"<br><b>Location:</b> "+request.location+
"<br><b>Status:</b> "+request.status
);

});

}

}catch(error){

console.error("Error loading requests:",error);

}

}


/* Location error */

function locationError(){

alert("Unable to detect location");

}

</script>

</body>
</html>
