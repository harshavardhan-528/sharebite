<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShareBite Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#f5f7fb;
color:#333;
}

/* NAVBAR */

.navbar{
background:#1e293b;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.navbar h2{
font-weight:600;
}

.nav-links a{
color:white;
text-decoration:none;
margin:8px 12px;
font-size:14px;
}

.nav-links a:hover{
color:#4ade80;
}

/* PAGE CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

/* CARD */

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* BUTTON */

button{
padding:10px 18px;
border:none;
border-radius:6px;
background:#16a34a;
color:white;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#15803d;
}

/* INPUT */

input,select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

</style>


<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#28a745;
color:white;
}

</style>

</head>

<body>

<div class="navbar">

<h2>ShareBite</h2>

<div class="nav-links">

<a href="index.html">Home</a> <a href="dashboard.html">Dashboard</a> <a href="donate.html">Donate</a> <a href="request.html">Request</a> <a href="map.html">Food Map</a> <a href="request-map.html">Requests Map</a> <a href="ngo.html">NGOs</a>

</div>

</div>


<h2>ShareBite Admin Dashboard</h2>

<table>

<thead>

<tr>
<th>Food</th>
<th>Quantity</th>
<th>Location</th>
<th>Status</th>
</tr>

</thead>

<tbody id="foodTable"></tbody>

</table>

<script>

fetch("/api/food/all")
.then(res=>res.json())
.then(data=>{

const table = document.getElementById("foodTable");

data.forEach(food=>{

table.innerHTML += `

<tr>

<td>${food.foodType}</td>
<td>${food.quantity}</td>
<td>${food.pickupAddress}</td>
<td>${food.status}</td>

</tr>

`;

});

});

</script>

</body>

</html>
