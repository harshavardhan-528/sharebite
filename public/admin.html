<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShareBite Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#28a745;
color:white;
}

</style>

</head>

<body>

<h2>ShareBite Admin Dashboard</h2>

<table>

<thead>

<tr>
<th>Food</th>
<th>Quantity</th>
<th>Location</th>
<th>Status</th>
</tr>

</thead>

<tbody id="foodTable"></tbody>

</table>

<script>

fetch("/api/food/all")
.then(res=>res.json())
.then(data=>{

const table = document.getElementById("foodTable");

data.forEach(food=>{

table.innerHTML += `

<tr>

<td>${food.foodType}</td>
<td>${food.quantity}</td>
<td>${food.pickupAddress}</td>
<td>${food.status}</td>

</tr>

`;

});

});

</script>

</body>

</html>
