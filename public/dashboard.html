<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShareBite Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#f5f7fb;
color:#333;
padding:20px;
}

/* NAVBAR */

.navbar{
background:#1e293b;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.nav-links a{
color:white;
text-decoration:none;
margin:8px 12px;
font-size:14px;
}

.nav-links a:hover{
color:#4ade80;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin:25px 0;
}

.logout{
background:#dc3545;
border:none;
padding:8px 16px;
color:white;
border-radius:6px;
cursor:pointer;
}

/* ACTION BUTTONS */

.actions{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:30px;
}

.actions button{
padding:10px 18px;
border:none;
border-radius:6px;
background:#16a34a;
color:white;
cursor:pointer;
}

.actions button:hover{
background:#15803d;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
color:#16a34a;
margin-top:5px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#16a34a;
color:white;
}

/* STATUS COLORS */

.available{
color:#16a34a;
font-weight:bold;
}

.accepted{
color:#f59e0b;
font-weight:bold;
}

.picked{
color:#2563eb;
font-weight:bold;
}

.delivered{
color:#059669;
font-weight:bold;
}

/* NOTIFICATION */

#notification{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
color:white;
padding:12px 18px;
border-radius:8px;
display:none;
z-index:999;
}

</style>

</head>

<body>

<div id="notification"></div>

<!-- NAVBAR -->

<div class="navbar">

<h2>ShareBite</h2>

<div class="nav-links">

<a href="index.html">Home</a> <a href="dashboard.html">Dashboard</a> <a href="donate.html">Donate</a> <a href="request.html">Request</a> <a href="map.html">Food Map</a> <a href="request-map.html">Requests Map</a> <a href="ngo.html">NGOs</a>

</div>

</div>

<!-- TOPBAR -->

<div class="topbar">

<h1>ShareBite Dashboard</h1>

<button class="logout" onclick="logout()">Logout</button>

</div>

<!-- ACTION BUTTONS -->

<div class="actions">

<button onclick="openDonate()">Donate Food</button>

<button onclick="openRequest()">Request Food</button>

<button onclick="openMap()">Nearby Donations</button>

<button onclick="openRequestMap()">Nearby Requests</button>

<button onclick="openTracking()">Track Volunteer</button>

<button onclick="openNGO()">NGOs</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="card">
<h3>Total Donations</h3>
<h2 id="totalFood">0</h2>
</div>

<div class="card">
<h3>Available</h3>
<h2 id="availableFood">0</h2>
</div>

<div class="card">
<h3>Accepted</h3>
<h2 id="acceptedFood">0</h2>
</div>

<div class="card">
<h3>Delivered</h3>
<h2 id="deliveredFood">0</h2>
</div>

</div>

<h2>All Food Donations</h2>

<table>

<thead>
<tr>
<th>Food Type</th>
<th>Quantity</th>
<th>Address</th>
<th>Status</th>
</tr>
</thead>

<tbody id="foodTable"></tbody>

</table>

<script>

/* LOGIN CHECK */

const token = localStorage.getItem("token");

if(!token){
window.location.href="login.html";
}


/* LOGOUT */

function logout(){
localStorage.clear();
window.location.href="login.html";
}


/* NAVIGATION */

function openDonate(){
window.location.href="/donate.html";
}

function openRequest(){
window.location.href="/request.html";
}

function openMap(){
window.location.href="/map.html";
}


function openTracking(){
window.location.href="/live-tracking.html";
}

function openNGO(){
window.location.href="/ngo.html";
}


/* NOTIFICATION */

function showNotification(message){

const box = document.getElementById("notification");

box.innerText = message;
box.style.display="block";

setTimeout(()=>{
box.style.display="none";
},3000);

}


/* FETCH FOOD DATA */

function loadFood(){

const API_BASE = window.location.origin;

fetch(API_BASE + "/api/food/all")

.then(res=>res.json())

.then(data=>{

let total = data.length;
let available = 0;
let accepted = 0;
let delivered = 0;

const table = document.getElementById("foodTable");

table.innerHTML="";

data.forEach(food=>{

if(food.status==="available") available++;
if(food.status==="accepted") accepted++;
if(food.status==="delivered") delivered++;

const row = `
<tr>
<td>${food.foodType}</td>
<td>${food.quantity}</td>
<td>${food.pickupAddress}</td>
<td class="${food.status}">
${food.status}
</td>
</tr>
`;

table.innerHTML += row;

});

document.getElementById("totalFood").innerText = total;
document.getElementById("availableFood").innerText = available;
document.getElementById("acceptedFood").innerText = accepted;
document.getElementById("deliveredFood").innerText = delivered;

})

.catch(err=>console.log(err));

}

loadFood();

/* AUTO REFRESH */

setInterval(loadFood,10000);

</script>

</body>
</html>
