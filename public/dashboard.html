<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Redistribution Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
margin-bottom:20px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#28a745;
color:white;
}

</style>

</head>

<body>

<h1>Food Redistribution Dashboard</h1>

<div class="stats">

<div class="card">
<h3>Total Donations</h3>
<h2 id="totalFood">0</h2>
</div>

<div class="card">
<h3>Available</h3>
<h2 id="availableFood">0</h2>
</div>

<div class="card">
<h3>Accepted</h3>
<h2 id="acceptedFood">0</h2>
</div>

<div class="card">
<h3>Delivered</h3>
<h2 id="deliveredFood">0</h2>
</div>

</div>

<h2>All Food Donations</h2>

<table>

<thead>
<tr>
<th>Food Type</th>
<th>Quantity</th>
<th>Address</th>
<th>Status</th>
</tr>
</thead>

<tbody id="foodTable">
</tbody>

</table>

<script>

fetch("http://localhost:5000/api/food/all")
.then(function(res){
return res.json();
})
.then(function(data){

let total = data.length;
let available = 0;
let accepted = 0;
let delivered = 0;

const table = document.getElementById("foodTable");

data.forEach(function(food){

if(food.status === "available") available++;
if(food.status === "accepted") accepted++;
if(food.status === "delivered") delivered++;

const row = `
<tr>
<td>${food.foodType}</td>
<td>${food.quantity}</td>
<td>${food.pickupAddress}</td>
<td>${food.status}</td>
</tr>
`;

table.innerHTML += row;

});

document.getElementById("totalFood").innerText = total;
document.getElementById("availableFood").innerText = available;
document.getElementById("acceptedFood").innerText = accepted;
document.getElementById("deliveredFood").innerText = delivered;

})
.catch(function(error){
console.error(error);
});

</script>

</body>

</html>
