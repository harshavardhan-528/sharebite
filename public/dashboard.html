<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShareBite Dashboard</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
margin-bottom:10px;
}

/* Top bar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout{
background:#dc3545;
color:white;
border:none;
padding:8px 14px;
border-radius:5px;
cursor:pointer;
}

/* Navigation buttons */

.actions{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
flex-wrap:wrap;
}

.actions button{
padding:10px 18px;
border:none;
background:#28a745;
color:white;
cursor:pointer;
border-radius:6px;
font-size:14px;
}

.actions button:hover{
background:#1f7e34;
}

/* Stats cards */

.stats{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:150px;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#28a745;
color:white;
}

</style>

</head>

<body>

<div class="topbar">

<h1>ShareBite Dashboard</h1>

<button class="logout" onclick="logout()">Logout</button>

</div>

<!-- ACTION BUTTONS -->

<div class="actions">

<button onclick="openDonate()">Donate Food</button>

<button onclick="openRequest()">Request Food</button>

<button onclick="openMap()">Nearby Donations</button>

<button onclick="openRequestMap()">Nearby Requests</button>

<button onclick="openTracking()">Track Volunteer</button>

<button onclick="openNGO()">NGOs</button>

</div>


<!-- STATS -->

<div class="stats">

<div class="card">
<h3>Total Donations</h3>
<h2 id="totalFood">0</h2>
</div>

<div class="card">
<h3>Available</h3>
<h2 id="availableFood">0</h2>
</div>

<div class="card">
<h3>Accepted</h3>
<h2 id="acceptedFood">0</h2>
</div>

<div class="card">
<h3>Delivered</h3>
<h2 id="deliveredFood">0</h2>
</div>

</div>


<h2>All Food Donations</h2>

<table>

<thead>
<tr>
<th>Food Type</th>
<th>Quantity</th>
<th>Address</th>
<th>Status</th>
</tr>
</thead>

<tbody id="foodTable"></tbody>

</table>


<script>

/* ===============================
LOGIN CHECK
================================ */

const token = localStorage.getItem("token");

if(!token){

alert("Please login first");
window.location.href="login.html";

}


/* ===============================
LOGOUT
================================ */

function logout(){

localStorage.clear();
window.location.href="login.html";

}


/* ===============================
NAVIGATION FUNCTIONS
================================ */

function openDonate(){
window.location.href="/donate.html";
}

function openRequest(){
window.location.href="/request.html";
}

function openMap(){
window.location.href="/map.html";
}

function openRequestMap(){
window.location.href="/request-map.html";
}

function openTracking(){
window.location.href="/live-tracking.html";
}

function openNGO(){
window.location.href="/ngo.html";
}


/* ===============================
FETCH FOOD DATA
================================ */

const API_BASE = window.location.origin;

fetch(API_BASE + "/api/food/all")

.then(function(res){
return res.json();
})

.then(function(data){

let total = data.length;
let available = 0;
let accepted = 0;
let delivered = 0;

const table = document.getElementById("foodTable");

data.forEach(function(food){

if(food.status === "available") available++;
if(food.status === "accepted") accepted++;
if(food.status === "delivered") delivered++;

const row = `
<tr>
<td>${food.foodType}</td>
<td>${food.quantity}</td>
<td>${food.pickupAddress}</td>
<td>${food.status}</td>
</tr>
`;

table.innerHTML += row;

});

document.getElementById("totalFood").innerText = total;
document.getElementById("availableFood").innerText = available;
document.getElementById("acceptedFood").innerText = accepted;
document.getElementById("deliveredFood").innerText = delivered;

})

.catch(function(error){

console.error(error);

});

</script>

</body>
</html>
