<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donate Food | ShareBite</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1f7e34;
}

#map{
height:300px;
margin-top:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>Donate Food</h2>

<form id="donateForm">

<input type="text" id="foodType" placeholder="Food Type (Rice, Meals)" required>

<input type="text" id="quantity" placeholder="Quantity (10 plates)" required>

<input type="text" id="pickupAddress" placeholder="Enter pickup location">

<button type="button" onclick="searchLocation()">
Search Location
</button>

<button type="button" onclick="detectLocation()">
Use Current Location
</button>

<input type="hidden" id="latitude">
<input type="hidden" id="longitude">

<div>

<label for="donationTime">Donation Time</label>

<input type="datetime-local" id="donationTime" name="donationTime"/>

</div>

<div>

<label for="expiryTime">Expiry Time</label>
<input type="datetime-local" id="expiryTime" name="expiryTime" required />

</div>

<div>

<label for="image">Upload Food Image</label>
<input type="file" id="image" name="image" accept="image/*" />

</div>

<button type="submit">Donate Food</button>

</form>

<div id="map"></div>

</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API = window.location.origin;

/* Create map */

const map = L.map('map').setView([14.6819,77.6006],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}).addTo(map);

let marker;


/* Location search */

async function searchLocation(){

const address = document.getElementById("pickupAddress").value;

const res = await fetch(
`https://nominatim.openstreetmap.org/search?format=json&q=${address}`
);

const data = await res.json();

if(data.length === 0){

alert("Location not found");
return;

}

const lat = data[0].lat;
const lon = data[0].lon;

document.getElementById("latitude").value = lat;
document.getElementById("longitude").value = lon;

map.setView([lat,lon],15);

if(marker){

marker.setLatLng([lat,lon]);

}else{

marker = L.marker([lat,lon]).addTo(map);

}

}

function detectLocation(){

navigator.geolocation.getCurrentPosition(function(position){

const lat = position.coords.latitude;
const lon = position.coords.longitude;

document.getElementById("latitude").value = lat;
document.getElementById("longitude").value = lon;

map.setView([lat,lon],15);

if(marker){

marker.setLatLng([lat,lon]);

}else{

marker = L.marker([lat,lon]).addTo(map);

}

});

}


/* Submit donation */

document.getElementById("donateForm").addEventListener("submit",async function(e){

e.preventDefault();

const formData = new FormData();

formData.append("foodType",document.getElementById("foodType").value);
formData.append("quantity",document.getElementById("quantity").value);
formData.append("pickupAddress",document.getElementById("pickupAddress").value);
formData.append("latitude",document.getElementById("latitude").value);
formData.append("longitude",document.getElementById("longitude").value);
formData.append("donationTime",document.getElementById("donationTime").value);
formData.append("expiryTime",document.getElementById("expiryTime").value);

const image = document.getElementById("image").files[0];

if(image){
formData.append("image",image);
}

if(!document.getElementById("latitude").value){
alert("Please select or detect a location");
return;
}

const res = await fetch(API + "/api/food/donate",{

method:"POST",
body:formData

});

const data = await res.json();

alert(data.message);

});

</script>

</body>
</html>
