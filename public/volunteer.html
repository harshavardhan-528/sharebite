<head>

href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;

box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#f5f7fb;
color:#333;

justify-content:space-between;

}

}

}

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div class="navbar">

<h2>ShareBite</h2>

<div class="nav-links">

<a href="index.html">Home</a> <a href="dashboard.html">Dashboard</a> <a href="donate.html">Donate</a> <a href="request.html">Request</a> <a href="map.html">Food Map</a> <a href="request-map.html">Requests Map</a> <a href="ngo.html">NGOs</a>

</div>

</div>


<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>

/* =========================
CONNECT SOCKET
========================= */

const socket = io(window.location.origin);


/* =========================
CREATE MAP
========================= */

const map = L.map("map").setView([14.6819,77.6006],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"© OpenStreetMap"
}
).addTo(map);


/* =========================
VOLUNTEER MARKER
========================= */

let volunteerMarker;


/* =========================
SEND LOCATION TO SERVER
========================= */

function sendLocation(){

if(!navigator.geolocation){

alert("Geolocation not supported");
return;

}

navigator.geolocation.getCurrentPosition(

(position)=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;


/* Send location to backend */

socket.emit("volunteerLocation",{
lat:lat,
lng:lng
});


/* Update volunteer marker */

if(volunteerMarker){

volunteerMarker.setLatLng([lat,lng]);

}else{

volunteerMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("🚶 Volunteer Live Location")
.openPopup();

}


/* Center map on volunteer */

map.setView([lat,lng],15);

},

(error)=>{

console.log("Location error:",error);

}

);

}


/* =========================
AUTO SEND LOCATION
========================= */

setInterval(sendLocation,3000);


/* =========================
REAL TIME NOTIFICATIONS
========================= */


/* New donation */

socket.on("newFoodDonation",(data)=>{

alert(
"🍱 New Food Donation Available\n"+
"Food: "+data.foodType+
"\nQuantity: "+data.quantity+
"\nLocation: "+data.location
);

});


/* New request */

socket.on("newFoodRequest",(data)=>{

alert(
"📢 Someone requested food\n"+
"Food: "+data.foodType+
"\nQuantity: "+data.quantity+
"\nLocation: "+data.location
);

});


/* Request accepted */

socket.on("requestAccepted",(data)=>{

alert("✅ Food request accepted by volunteer");

});

</script>

</body>

</html>
