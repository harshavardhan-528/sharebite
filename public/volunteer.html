<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volunteer Live Tracking</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>

/* Connect socket */
const socket = io();

/* Create Map */

const map = L.map("map").setView([14.6819,77.6006],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}
).addTo(map);

let marker;


/* Send volunteer location */

function sendLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(position=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;

/* Send location to server */

socket.emit("volunteerLocation",{
lat:lat,
lng:lng
});

/* Show volunteer marker */

if(marker){

marker.setLatLng([lat,lng]);

}else{

marker = L.marker([lat,lng])
.addTo(map)
.bindPopup("You (Volunteer)")
.openPopup();

}

});

}

}


/* Update location every 5 seconds */

setInterval(sendLocation,5000);



/* ========================
REAL TIME NOTIFICATIONS
======================== */


/* New donation */

socket.on("newFoodDonation",(data)=>{

alert(
"🍱 New Food Donation Available\n"+
"Food: "+data.foodType+
"\nQuantity: "+data.quantity+
"\nLocation: "+data.location
);

});


/* New request */

socket.on("newFoodRequest",(data)=>{

alert(
"📢 Someone requested food\n"+
"Food: "+data.foodType+
"\nQuantity: "+data.quantity+
"\nLocation: "+data.location
);

});


/* Request accepted */

socket.on("requestAccepted",(data)=>{

alert("✅ Food request accepted by volunteer");

});

</script>

</body>
</html>
