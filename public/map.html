<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShareBite Food Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#f5f7fb;
color:#333;
}

/* NAVBAR */

.navbar{
background:#1e293b;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.nav-links a{
color:white;
text-decoration:none;
margin:8px 12px;
font-size:14px;
}

.nav-links a:hover{
color:#4ade80;
}

/* MAP */

#map{
height:calc(100vh - 70px);
width:100%;
}

.navigate{
background:#007bff;
margin-top:5px;
}

button{
padding:8px 10px;
border:none;
border-radius:6px;
background:#16a34a;
color:white;
cursor:pointer;
font-size:14px;
}

</style>

</head>

<body>

<div class="navbar">

<h2>ShareBite</h2>

<div class="nav-links">

<a href="index.html">Home</a> <a href="dashboard.html">Dashboard</a> <a href="donate.html">Donate</a> <a href="request.html">Request</a> <a href="map.html">Food Map</a> <a href="request-map.html">Requests Map</a> <a href="ngo.html">NGOs</a>

</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script src="/socket.io/socket.io.js"></script>

<script>

/* SOCKET CONNECTION */

const socket = io(window.location.origin);


/* CREATE MAP */

const map = L.map("map").setView([14.6819,77.6006],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}
).addTo(map);

let volunteerMarker;
let userMarker;
let routingControl;


/* DISTANCE CALCULATION */

function getDistance(lat1,lon1,lat2,lon2){

const R = 6371;

const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)*Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)*Math.sin(dLon/2);

const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}


/* ETA */

function getETA(distance){

const speed = 30;

return Math.round((distance/speed)*60);

}


/* DRAW ROUTE */

function drawRoute(startLat,startLng,endLat,endLng){

if(routingControl){

map.removeControl(routingControl);

}

routingControl = L.Routing.control({

waypoints:[
L.latLng(startLat,startLng),
L.latLng(endLat,endLng)
],

routeWhileDragging:false,
addWaypoints:false,
draggableWaypoints:false,
fitSelectedRoutes:true,
show:false

}).addTo(map);

}


/* USER LOCATION */

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(position=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;

map.setView([lat,lng],13);

userMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("You are here")
.openPopup();


/* LOAD FOOD */

fetch(`/api/food/nearby?lat=${lat}&lng=${lng}`)

.then(res=>res.json())

.then(data=>{

data.foods.forEach(food=>{

const distance = getDistance(
lat,
lng,
food.latitude,
food.longitude
);

const eta = getETA(distance);

L.marker([food.latitude,food.longitude])

.addTo(map)

.bindPopup(`

<div style="width:220px">

<h3>${food.foodType}</h3>

<p><b>Quantity:</b> ${food.quantity}</p>

<p><b>Location:</b> ${food.pickupAddress}</p>

<p><b>Distance:</b> ${distance.toFixed(2)} km</p>

<p><b>ETA:</b> ${eta} minutes</p>

<button onclick="acceptFood('${food._id}',${food.latitude},${food.longitude})">

Accept Pickup

</button>

<br><br>

<button class="navigate"
onclick="navigate(${food.latitude},${food.longitude})">

Navigate

</button>

</div>

`);

});

});

});

}


/* ACCEPT FOOD */

function acceptFood(foodId,lat,lng){

fetch("/api/food/accept",{

method:"PATCH",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

foodId:foodId,
volunteerId:"demoVolunteer"

})

})

.then(res=>res.json())

.then(()=>{

alert("Food accepted");

if(userMarker){

const userPos = userMarker.getLatLng();

drawRoute(userPos.lat,userPos.lng,lat,lng);

}

});

}


/* GOOGLE NAVIGATION */

function navigate(lat,lng){

const url =
`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;

window.open(url,"_blank");

}


/* VOLUNTEER LIVE LOCATION */

socket.on("updateVolunteerLocation",(data)=>{

const lat = data.lat;
const lng = data.lng;

if(volunteerMarker){

volunteerMarker.setLatLng([lat,lng]);

}else{

volunteerMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("Volunteer Live Location");

}

});


/* NOTIFICATIONS */

socket.on("newFoodDonation",(data)=>{

alert(
"🍱 New Food Donation\n"+
"Food: "+data.foodType+
"\nQuantity: "+data.quantity+
"\nLocation: "+data.location
);

});

socket.on("deliveryUpdate",(data)=>{

alert(
"🚚 Delivery Status Updated\n"+
"Status: "+data.status
);

});

</script>

</body>
</html>
