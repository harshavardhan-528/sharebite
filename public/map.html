<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShareBite Food Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
background:#28a745;
color:white;
cursor:pointer;
}

.navigate{
background:#007bff;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script src="/socket.io/socket.io.js"></script>

<script>

/* =========================
SOCKET CONNECTION
========================= */

const socket = io(window.location.origin);


/* =========================
CREATE MAP
========================= */

const map = L.map("map").setView([14.6819,77.6006],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}
).addTo(map);

let volunteerMarker;
let userMarker;
let routingControl;


/* =========================
DISTANCE CALCULATION
========================= */

function getDistance(lat1, lon1, lat2, lon2){

const R = 6371;

const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2) *
Math.sin(dLon/2);

const c = 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}


/* =========================
ETA CALCULATION
========================= */

function getETA(distance){

const speed = 30;

const time = (distance / speed) * 60;

return Math.round(time);

}


/* =========================
DRAW REAL ROAD ROUTE
========================= */

function drawRoute(startLat,startLng,endLat,endLng){

if(routingControl){

map.removeControl(routingControl);

}

routingControl = L.Routing.control({

waypoints:[
L.latLng(startLat,startLng),
L.latLng(endLat,endLng)
],

routeWhileDragging:false,
addWaypoints:false,
draggableWaypoints:false,
fitSelectedRoutes:true,
show:false

}).addTo(map);

}


/* =========================
DETECT USER LOCATION
========================= */

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(position=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;

map.setView([lat,lng],13);

userMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("You are here")
.openPopup();


/* =========================
LOAD NEARBY FOOD
========================= */

fetch(`/api/food/nearby?lat=${lat}&lng=${lng}`)

.then(res=>res.json())

.then(data=>{

data.foods.forEach(food=>{

const distance = getDistance(
lat,
lng,
food.latitude,
food.longitude
);

const eta = getETA(distance);

L.marker([food.latitude,food.longitude])

.addTo(map)

.bindPopup(

`<b>${food.foodType}</b><br>

Quantity: ${food.quantity}<br>

Address: ${food.pickupAddress}<br>

Distance: ${distance.toFixed(2)} km<br>

ETA: ${eta} min<br><br>

<button onclick="acceptFood('${food._id}',${food.latitude},${food.longitude})">
Accept
</button>

<br><br>

<button class="navigate"
onclick="navigate(${food.latitude},${food.longitude})">

Navigate

</button>

`

);

});

});

});

}


/* =========================
ACCEPT FOOD
========================= */

function acceptFood(foodId,lat,lng){

fetch("/api/food/accept",{

method:"PATCH",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

foodId:foodId,
volunteerId:"demoVolunteer"

})

})

.then(res=>res.json())

.then(data=>{

alert("Food accepted");

if(userMarker){

const userPos = userMarker.getLatLng();

drawRoute(userPos.lat,userPos.lng,lat,lng);

}

});

}


/* =========================
GOOGLE NAVIGATION
========================= */

function navigate(lat,lng){

const url =
`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;

window.open(url,"_blank");

}


/* =========================
VOLUNTEER LIVE LOCATION
========================= */

socket.on("updateVolunteerLocation",(data)=>{

const lat = data.lat;
const lng = data.lng;

if(volunteerMarker){

volunteerMarker.setLatLng([lat,lng]);

}else{

volunteerMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("Volunteer Live Location");

}

});


/* =========================
REAL TIME NOTIFICATIONS
========================= */

socket.on("newFoodDonation",(data)=>{

alert(
"🍱 New Food Donation\n"+
"Food: "+data.foodType+
"\nQuantity: "+data.quantity+
"\nLocation: "+data.location
);

});


socket.on("deliveryUpdate",(data)=>{

alert(
"🚚 Delivery Status Updated\n"+
"Status: "+data.status
);

});

</script>

</body>

</html>
