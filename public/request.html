<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nearby Food Requests | ShareBite</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:#f5f7fb;
color:#333;
}

/* NAVBAR */

color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;

}

.navbar h2{
font-weight:600;
}

.nav-links a{
color:white;
text-decoration:none;
margin:8px 12px;
font-size:14px;
}

.nav-links a:hover{
color:#4ade80;
}

/* PAGE CONTAINER */

.container{
max-width:900px;

}

/* CARD */

</style>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

button{

padding:6px 10px;
border:none;
border-radius:4px;
background:#ff9800;
color:white;
cursor:pointer;

}

.navigate{
background:#007bff;
}

</style>

</head>

<body>

<div class="navbar">

<h2>ShareBite</h2>

<div class="nav-links">

<a href="index.html">Home</a> <a href="dashboard.html">Dashboard</a> <a href="donate.html">Donate</a> <a href="request.html">Request</a> <a href="map.html">Food Map</a> <a href="request-map.html">Requests Map</a> <a href="ngo.html">NGOs</a>

</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>

/* ================================
SOCKET CONNECTION
================================ */

const socket = io(window.location.origin);


/* ================================
CREATE MAP
================================ */

const map = L.map("map").setView([14.6819,77.6006],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
attribution:"© OpenStreetMap"
}
).addTo(map);

let volunteerMarker;
let userMarker;
let routeLine;


/* ================================
DISTANCE FUNCTION
================================ */

function calculateDistance(lat1,lon1,lat2,lon2){

const R = 6371;

const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)*Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}


/* ================================
ETA FUNCTION
================================ */

function calculateETA(distance){

const speed = 30;

const time = distance/speed;

return Math.round(time*60);

}


/* ================================
DRAW ROUTE
================================ */

function drawRoute(vLat,vLng,rLat,rLng){

const route = [
[vLat,vLng],
[rLat,rLng]
];

if(routeLine){

map.removeLayer(routeLine);

}

routeLine = L.polyline(route,{
color:"purple",
weight:4
}).addTo(map);

}


/* ================================
DETECT USER LOCATION
================================ */

navigator.geolocation.getCurrentPosition(position=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;

map.setView([lat,lng],13);

userMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("You are here");


/* ================================
LOAD NEARBY REQUESTS
================================ */

fetch(`/api/request/nearby?lat=${lat}&lng=${lng}`)

.then(res=>res.json())

.then(data=>{

data.requests.forEach(request=>{

const distance = calculateDistance(
lat,
lng,
request.latitude,
request.longitude
);

const eta = calculateETA(distance);

L.marker([request.latitude,request.longitude])

.addTo(map)

.bindPopup(

`<b>Food Needed</b><br>

Type: ${request.foodType}<br>

Quantity: ${request.quantity}<br>

Location: ${request.location}<br>

Distance: ${distance.toFixed(2)} km<br>

ETA: ${eta} min<br><br>

<button onclick="acceptRequest('${request._id}')">
Accept Request
</button>

<br><br>

<button class="navigate"
onclick="navigate(${request.latitude},${request.longitude})">

Navigate

</button>

`

);

});

});

});


/* ================================
ACCEPT REQUEST
================================ */

function acceptRequest(requestId){

fetch("/api/request/accept",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

requestId:requestId,
volunteerId:"demoVolunteer"

})

})

.then(res=>res.json())

.then(data=>{

alert("Request accepted");

location.reload();

});

}


/* ================================
GOOGLE NAVIGATION
================================ */

function navigate(lat,lng){

const url =
`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;

window.open(url,"_blank");

}


/* ================================
VOLUNTEER LIVE LOCATION
================================ */

socket.on("updateVolunteerLocation",(data)=>{

const lat = data.lat;
const lng = data.lng;

if(volunteerMarker){

volunteerMarker.setLatLng([lat,lng]);

}else{

volunteerMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("Volunteer Live Location");

}

});


/* ================================
REAL TIME NOTIFICATIONS
================================ */

socket.on("newFoodRequest",(data)=>{

alert(
"📢 New Food Request\n"+
"Food: "+data.foodType+
"\nQuantity: "+data.quantity+
"\nLocation: "+data.location
);

});


socket.on("requestAccepted",(data)=>{

alert("✅ A volunteer accepted a food request");

});

</script>

</body>

</html>
